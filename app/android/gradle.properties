org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# flutter_libserialport (desktop) deklaruje minSdk 16 w natywnym buildzie, a NDK
# 27 wymaga ≥21. Realny minSdk apki jest ≥21, więc bezpiecznie podnosimy próg
# natywnego builda do 21 (inaczej [CXX1110] wywala build Androida).
android.ndk.suppressMinSdkVersionError=21
# Ta sama stara wtyczka nie wyrównuje JVM target (Java 1.8 vs Kotlin 17), co AGP
# 8 traktuje jako błąd. Sprowadzamy do ostrzeżenia — dotyczy tylko modułów z
# niespójnością (flutter_libserialport), reszta kompiluje się normalnie.
kotlin.jvm.target.validation.mode=warning
