; Projekt firmware odbiornika GPS RTK — ESP32 (most UART<->BLE).
; Otwórz katalog `firmware/` w VS Code z rozszerzeniem PlatformIO IDE.
;
; Dwa środowiska (warianty radia — WYKLUCZAJĄ SIĘ, flashujesz jedno):
;   esp32dev      — DOCELOWY: most BLE NUS (NimBLE). To kontrakt z aplikacją.
;   esp32dev-spp  — TESTOWY:  most Bluetooth Classic SPP (Bluedroid) do SW Maps/Lefebure.
; (SPP wymaga Bluedroid, BLE używa NimBLE — w jednym firmware się nie godzą, stąd 2 env.)
;
; Budowanie:   pio run                          (domyślnie: esp32dev = BLE)
;              pio run -e esp32dev-spp           (wariant SPP)
;              pio run -e esp32dev -e esp32dev-spp   (oba naraz, weryfikacja)
; Wgranie:     pio run -e esp32dev -t upload
; Monitor:     pio device monitor   (115200)

[platformio]
default_envs = esp32dev      ; „pio run" bez -e buduje wariant docelowy (BLE)

[env]
platform = espressif32
board = esp32dev             ; generyczny moduł ESP32-WROOM-32 (BT Classic SPP + BLE)
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    olikraus/U8g2 @ ^2.34.0            ; OLED SSD1306 (status) — wspólny dla obu wariantów

; Opcjonalne nadpisania flag funkcji (domyślne wartości w include/config.h):
; build_flags =
;   -D ENABLE_OLED=0          ; bez wyświetlacza
;   -D ENABLE_GNSS_CONFIG=1   ; konfiguracja LC29HEA przy starcie (zweryfikuj komendy!)
;   -D DEBUG_ECHO_NMEA=1      ; echo NMEA na monitor USB

[env:esp32dev]               ; DOCELOWY — BLE NUS (NimBLE, BLE-only, lekki)
lib_deps =
    ${env.lib_deps}
    h2zero/NimBLE-Arduino @ ^2.1.0     ; 2.x dla rdzenia Arduino-ESP32 3.x

[env:esp32dev-spp]           ; TESTOWY — Bluetooth Classic SPP (Bluedroid)
build_flags = -D BUILD_SPP=1
; SPP (Bluedroid) bywa większe niż domyślna partycja aplikacji — w razie
; przepełnienia Flash odkomentuj większą partycję:
; board_build.partitions = huge_app.csv
